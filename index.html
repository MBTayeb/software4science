<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Hub</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="theme-toggle-parent"><button id="theme-toggle">Toggle Dark Mode</button></div>
    <script src="assets/dark.js" defer></script>
    <div id="content-placeholder"></div>
    <h5 style="color: red;">
        <a href="topics/loader.html" id="overview-link">
            Overview of the course:
        </a>
    </h5>
    <div id="topics-placeholder" class="daughter-lists-bigger"></div>
    <script>
    fetch("intro/page.html")
        .then((response) => response.text())
        .then((data) => {
            document.getElementById("content-placeholder").innerHTML = data;
            const pageTitle = document.querySelector('h4');
            if (pageTitle) {
                document.title = pageTitle.textContent;
            }
        })
        .catch((error) => console.error("Error loading the HTML:", error));
    fetch("topics/page.html")
        .then((response) => response.text())
        .then((data) => {
            let fixedData = data.replaceAll('href="../', 'href="');
            document.getElementById("topics-placeholder").innerHTML = fixedData;
        })
        .catch((error) => console.error("Error loading the HTML:", error));
    </script>
</body>
</html>
